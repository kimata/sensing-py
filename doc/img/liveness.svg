<svg viewBox="0 0 940 360" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="940" height="360" fill="#ffffff"/>
  <text x="20" y="28" font-size="13" font-weight="bold" fill="#334155">Liveness とヘルスチェックの連鎖</text>

  <!-- sensing -->
  <rect x="20" y="60" width="250" height="110" rx="6" fill="#fefce8" stroke="#eab308"/>
  <text x="145" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#713f12">sensing (メインループ)</text>
  <text x="35" y="102" font-size="10" fill="#334155">周期の最後に条件を満たせば</text>
  <text x="35" y="117" font-size="10" fill="#334155">my_lib.footprint.update() を実行:</text>
  <text x="35" y="136" font-size="10" font-weight="bold" fill="#713f12">・全 active センサーの計測成功</text>
  <text x="35" y="152" font-size="10" font-weight="bold" fill="#713f12">・かつ 送信成功 or スプール退避成功</text>

  <!-- footprint -->
  <rect x="330" y="60" width="270" height="110" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="465" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">liveness ファイル</text>
  <text x="345" y="102" font-size="10" fill="#334155">config: liveness.file.sensing</text>
  <text x="345" y="117" font-size="10" fill="#334155">(例: /dev/shm/healthz)</text>
  <text x="345" y="136" font-size="10" fill="#334155">一時ファイル→chmod 0644→rename で</text>
  <text x="345" y="152" font-size="10" fill="#334155">アトミックに更新 (内容 = epoch 秒)</text>

  <!-- healthz CLI -->
  <rect x="660" y="60" width="260" height="110" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="790" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">sensing-healthz (別プロセス)</text>
  <text x="675" y="102" font-size="10" fill="#334155">my_lib.healthz.check_liveness_all()</text>
  <text x="675" y="121" font-size="10" font-weight="bold" fill="#b91c1c">経過 &gt; max(2 × interval_sec, 60s)</text>
  <text x="675" y="137" font-size="10" fill="#334155">→ NG: exit 1 / OK: exit 0</text>
  <text x="675" y="153" font-size="10" fill="#64748b">interval_sec=20 なら実効閾値は 60 秒</text>

  <line x1="270" y1="115" x2="328" y2="115" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="278" y="107" font-size="9.5" fill="#475569">update</text>
  <line x1="600" y1="115" x2="658" y2="115" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="608" y="107" font-size="9.5" fill="#475569">mtime 参照</text>

  <!-- 監視主体 -->
  <rect x="330" y="220" width="280" height="90" rx="6" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="470" y="242" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1e3a8a">Docker HEALTHCHECK</text>
  <text x="345" y="262" font-size="10" font-family="monospace" fill="#334155">--interval=60s --timeout=10s</text>
  <text x="345" y="277" font-size="10" font-family="monospace" fill="#334155">--start-period=120s --retries=2</text>
  <text x="345" y="295" font-size="10" font-family="monospace" fill="#334155">CMD ["sensing-healthz"]</text>

  <rect x="650" y="220" width="270" height="90" rx="6" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="785" y="242" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1e3a8a">K8s livenessProbe</text>
  <text x="665" y="262" font-size="10" fill="#334155">exec: sensing-healthz (60 秒毎)</text>
  <text x="665" y="277" font-size="10" fill="#334155">失敗 2 回で Pod 再起動</text>
  <text x="665" y="295" font-size="10" fill="#64748b">kubernetes/sensing.example.yaml 参照</text>

  <line x1="720" y1="170" x2="510" y2="218" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="800" y1="170" x2="790" y2="218" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <text x="20" y="340" font-size="10.5" fill="#64748b">※ ハングや連続的な計測失敗が起きると liveness が更新されなくなり、コンテナ再起動として回復が図られる。</text>
</svg>
