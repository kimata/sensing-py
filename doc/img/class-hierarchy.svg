<svg viewBox="0 0 940 600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="tri" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#ffffff" stroke="#475569" stroke-width="1.2"/>
    </marker>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d28d9"/>
    </marker>
  </defs>
  <rect width="940" height="600" fill="#ffffff"/>
  <text x="20" y="26" font-size="13" font-weight="bold" fill="#334155">センサークラス階層 (my_lib/sensor/)   ── ▷ は継承、--&gt; は保持・利用</text>

  <!-- SensorBase -->
  <rect x="330" y="42" width="280" height="118" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="470" y="62" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#4c1d95">SensorBase (ABC)</text>
  <line x1="345" y1="70" x2="595" y2="70" stroke="#c4b5fd"/>
  <text x="345" y="86" font-size="10" fill="#334155">NAME / TYPE / required / consecutive_fails</text>
  <text x="345" y="101" font-size="10" fill="#334155">field_prefix / field_rename</text>
  <text x="345" y="118" font-size="10" fill="#334155">ping() → bool (抽象)</text>
  <text x="345" y="133" font-size="10" fill="#334155">get_value_map() → dict (抽象)</text>
  <text x="345" y="148" font-size="10" fill="#334155">close() (既定 no-op)</text>

  <!-- I2CSensorBase -->
  <rect x="40" y="200" width="300" height="88" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="190" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a8a">I2CSensorBase (TYPE="I2C")</text>
  <line x1="55" y1="228" x2="325" y2="228" stroke="#bfdbfe"/>
  <text x="55" y="244" font-size="10" fill="#334155">bus_id / dev_addr / i2cbus (I2CBUS = smbus2 ラッパ)</text>
  <text x="55" y="259" font-size="10" fill="#334155">ping(): _ping_impl() を呼び、全例外を「応答なし」化</text>
  <text x="55" y="274" font-size="10" fill="#334155">close(): I2C バスハンドル解放</text>

  <!-- UARTSensorBase -->
  <rect x="380" y="200" width="180" height="52" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="470" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a8a">UARTSensorBase</text>
  <text x="470" y="238" text-anchor="middle" font-size="10" fill="#334155">TYPE="UART"</text>

  <!-- 直接継承 -->
  <rect x="600" y="200" width="150" height="52" rx="6" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="675" y="220" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1e3a8a">MAX31856</text>
  <text x="675" y="238" text-anchor="middle" font-size="10" fill="#334155">TYPE="SPI" (spidev)</text>

  <rect x="770" y="200" width="150" height="52" rx="6" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="845" y="220" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1e3a8a">FD_Q10C</text>
  <text x="845" y="238" text-anchor="middle" font-size="10" fill="#334155">TYPE="IO_LINK" (LTC2874)</text>

  <!-- 継承線 (上向き) -->
  <line x1="190" y1="198" x2="400" y2="162" stroke="#475569" stroke-width="1.2" marker-end="url(#tri)"/>
  <line x1="470" y1="198" x2="470" y2="162" stroke="#475569" stroke-width="1.2" marker-end="url(#tri)"/>
  <line x1="675" y1="198" x2="540" y2="162" stroke="#475569" stroke-width="1.2" marker-end="url(#tri)"/>
  <line x1="845" y1="198" x2="580" y2="160" stroke="#475569" stroke-width="1.2" marker-end="url(#tri)"/>

  <!-- I2C 配下: 中間基底 -->
  <rect x="40" y="330" width="200" height="66" rx="6" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.4"/>
  <text x="140" y="350" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#14532d">EZOBase</text>
  <text x="140" y="366" text-anchor="middle" font-size="9.5" fill="#166534">Atlas EZO 共通: exec_command()</text>
  <text x="140" y="381" text-anchor="middle" font-size="9.5" fill="#166534">ステータスバイト (1/254/255) 検査</text>

  <rect x="260" y="330" width="200" height="66" rx="6" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.4"/>
  <text x="360" y="350" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#14532d">ADSBase</text>
  <text x="360" y="366" text-anchor="middle" font-size="9.5" fill="#166534">ADS101x/111x 共通: ワンショット変換</text>
  <text x="360" y="381" text-anchor="middle" font-size="9.5" fill="#166534">+ OS ビットポーリング</text>

  <line x1="140" y1="328" x2="150" y2="290" stroke="#475569" stroke-width="1.2" marker-end="url(#tri)"/>
  <line x1="360" y1="328" x2="270" y2="290" stroke="#475569" stroke-width="1.2" marker-end="url(#tri)"/>

  <!-- EZO 子 -->
  <rect x="20" y="430" width="240" height="40" rx="6" fill="#ffffff" stroke="#4ade80"/>
  <text x="140" y="448" text-anchor="middle" font-size="10.5" fill="#14532d">EZO_PH (ph) / EZO_RTD (temp) / EZO_DO (do)</text>
  <text x="140" y="463" text-anchor="middle" font-size="9" fill="#166534">DEVICE_ID でデバイス名を照合</text>
  <line x1="140" y1="428" x2="140" y2="398" stroke="#475569" stroke-width="1.2" marker-end="url(#tri)"/>

  <!-- ADS 子 -->
  <rect x="280" y="430" width="180" height="40" rx="6" fill="#ffffff" stroke="#4ade80"/>
  <text x="370" y="448" text-anchor="middle" font-size="10.5" fill="#14532d">ADS1015 / ADS1115</text>
  <text x="370" y="463" text-anchor="middle" font-size="9" fill="#166534">(mvolt)</text>
  <line x1="370" y1="428" x2="365" y2="398" stroke="#475569" stroke-width="1.2" marker-end="url(#tri)"/>

  <!-- I2C 直接ドライバ -->
  <rect x="20" y="500" width="440" height="56" rx="6" fill="#ffffff" stroke="#60a5fa"/>
  <text x="240" y="519" text-anchor="middle" font-size="10.5" fill="#1e3a8a">SHT35 (temp, humi) / SCD4X (co2, temp, humi) / APDS9250 (lux)</text>
  <text x="240" y="535" text-anchor="middle" font-size="10.5" fill="#1e3a8a">SM9561 (lux) / VEML7700 (lux) / VEML6075 (uva, uvb, uvi)</text>
  <text x="240" y="550" text-anchor="middle" font-size="10.5" fill="#1e3a8a">GROVE_TDS (tds) / LP_PYRA03 (solar_rad)</text>
  <line x1="100" y1="498" x2="110" y2="290" stroke="#475569" stroke-width="1.2" marker-end="url(#tri)"/>

  <!-- GROVE/LP → ADS1115 保持 -->
  <path d="M 460 540 C 560 540 560 460 462 452" stroke="#6d28d9" stroke-width="1.2" stroke-dasharray="5 3" fill="none" marker-end="url(#arrow)"/>
  <text x="530" y="510" font-size="9.5" fill="#6d28d9">GROVE_TDS / LP_PYRA03 は</text>
  <text x="530" y="523" font-size="9.5" fill="#6d28d9">内部に ADS1115 を保持 (バス共有)</text>

  <!-- UART 子 -->
  <rect x="600" y="330" width="150" height="46" rx="6" fill="#ffffff" stroke="#60a5fa"/>
  <text x="675" y="349" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a8a">RG_15</text>
  <text x="675" y="365" text-anchor="middle" font-size="9.5" fill="#334155">(rain, raining)</text>

  <rect x="770" y="330" width="150" height="46" rx="6" fill="#ffffff" stroke="#60a5fa"/>
  <text x="845" y="349" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a8a">EchonetEnergy</text>
  <text x="845" y="365" text-anchor="middle" font-size="9.5" fill="#334155">(power)</text>

  <line x1="655" y1="328" x2="510" y2="254" stroke="#475569" stroke-width="1.2" marker-end="url(#tri)"/>
  <line x1="800" y1="328" x2="540" y2="248" stroke="#475569" stroke-width="1.2" marker-end="url(#tri)"/>

  <!-- BP35A1 / ECHONETLite -->
  <rect x="700" y="430" width="220" height="76" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="6 3"/>
  <text x="810" y="450" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">Sensor ではない補助クラス</text>
  <text x="810" y="468" text-anchor="middle" font-size="10" fill="#64748b">BP35A1 (Wi-SUN セッション層)</text>
  <text x="810" y="484" text-anchor="middle" font-size="10" fill="#64748b">ECHONETLite (プロトコル実装)</text>
  <text x="810" y="500" text-anchor="middle" font-size="9" fill="#64748b">→ load() のホワイトリストからは除外される</text>
  <line x1="845" y1="428" x2="845" y2="378" stroke="#6d28d9" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="855" y="408" font-size="9.5" fill="#6d28d9">利用</text>
</svg>
