<svg viewBox="0 0 940 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="940" height="400" fill="#ffffff"/>
  <text x="20" y="28" font-size="13" font-weight="bold" fill="#334155">センサーの状態遷移 (app.py + my_lib.sensor)</text>

  <!-- 起動 -->
  <circle cx="80" cy="120" r="8" fill="#334155"/>
  <text x="80" y="100" text-anchor="middle" font-size="10.5" fill="#334155">起動 (load)</text>

  <!-- ACTIVE -->
  <rect x="200" y="70" width="280" height="100" rx="12" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="340" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">ACTIVE</text>
  <text x="340" y="116" text-anchor="middle" font-size="10.5" fill="#334155">毎周期 get_value_map() で計測される</text>
  <text x="340" y="132" text-anchor="middle" font-size="10.5" fill="#334155">成功 → consecutive_fails = 0</text>
  <text x="340" y="148" text-anchor="middle" font-size="10.5" fill="#334155">失敗 → consecutive_fails++ (is_success=False)</text>

  <!-- INACTIVE -->
  <rect x="600" y="70" width="300" height="100" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="750" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">INACTIVE</text>
  <text x="750" y="116" text-anchor="middle" font-size="10.5" fill="#334155">計測対象から除外される</text>
  <text x="750" y="132" text-anchor="middle" font-size="10.5" fill="#334155">毎周期ラウンドロビンで 1 台だけ</text>
  <text x="750" y="148" text-anchor="middle" font-size="10.5" fill="#334155">ping による復帰確認を受ける</text>

  <!-- 起動 → ACTIVE / INACTIVE -->
  <line x1="88" y1="115" x2="198" y2="105" stroke="#16a34a" stroke-width="1.6" marker-end="url(#green)"/>
  <text x="115" y="98" font-size="10" fill="#16a34a">起動時 ping OK</text>
  <path d="M 85 128 C 200 210 500 210 640 172" stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="230" y="205" font-size="10" fill="#64748b">起動時 ping NG (required: false)</text>

  <!-- ACTIVE → INACTIVE -->
  <path d="M 480 100 C 530 100 550 100 598 100" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#red)"/>
  <text x="539" y="88" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#dc2626">consecutive_fails == 2</text>
  <text x="539" y="102" text-anchor="middle" font-size="9.5" fill="#dc2626">(FAIL_THRESHOLD)</text>

  <!-- INACTIVE → ACTIVE -->
  <path d="M 598 145 C 550 145 530 145 482 145" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#green)"/>
  <text x="539" y="136" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#16a34a">retry_inactive: ping OK</text>
  <text x="539" y="160" text-anchor="middle" font-size="9.5" fill="#16a34a">consecutive_fails = 0</text>

  <!-- 必須センサー -->
  <rect x="20" y="250" width="280" height="60" rx="8" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="160" y="272" text-anchor="middle" font-size="11" font-weight="bold" fill="#b91c1c">required: true のセンサー</text>
  <text x="160" y="290" text-anchor="middle" font-size="10" fill="#7f1d1d">起動時 ping NG → RuntimeError で起動失敗</text>
  <text x="160" y="303" text-anchor="middle" font-size="9.5" fill="#7f1d1d">(運用中の降格は required に関わらず行われる)</text>

  <!-- 通知イベント -->
  <rect x="330" y="250" width="590" height="110" rx="8" fill="#fdf2f8" stroke="#f472b6"/>
  <text x="345" y="272" font-size="11" font-weight="bold" fill="#9d174d">Slack 通知が発生する遷移</text>
  <text x="345" y="292" font-size="10.5" fill="#334155">・ACTIVE → INACTIVE (連続 2 回失敗の瞬間に 1 回だけ): error チャンネルへトレースバック付き通知</text>
  <text x="345" y="310" font-size="10.5" fill="#334155">・INACTIVE → ACTIVE (retry_inactive で復帰): info チャンネルへ復帰通知 (info 設定時のみ。常にログには出力)</text>
  <text x="345" y="330" font-size="10.5" fill="#64748b">※ error 通知は my_lib.notify.slack がアプリ名 + タイトル別のキーで interval_min (config.example.yaml では 180 分) の</text>
  <text x="345" y="346" font-size="10.5" fill="#64748b">   レート制限をかける。送信に成功した場合のみ制限タイマーが開始される。</text>
</svg>
